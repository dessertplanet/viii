<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>viii — virtual iii</title>
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <span class="logo">viii</span>
      <span class="status-pill" id="statusPill">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">not connected</span>
      </span>
    </div>
    <div class="header-right">
      <select id="midiOut" title="MIDI output">
        <option value="">midi out: none</option>
      </select>
      <select id="midiIn" title="MIDI input">
        <option value="">midi in: none</option>
      </select>
    </div>
  </header>

  <main>
    <div id="filePane" class="pane">
      <div class="pane-header">
        <span class="file-icon"><svg viewBox="0 0 16 16"><path d="M4 1.75h5.2l3.05 3.05V14.25H4z" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/><path d="M9.2 1.75v3.05h3.05" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg></span>
        <button id="refreshFilesBtn" class="pane-refresh" title="refresh file list">
          <svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg"><path d="M600,0C308.74,0,66.009,207.555,11.499,482.812h166.553C229.37,297.756,398.603,161.719,600,161.719c121.069,0,230.474,49.195,309.668,128.613l-192.48,192.48h304.762H1200V0l-175.781,175.781C915.653,67.181,765.698,0,600,0z M0,717.188V1200l175.781-175.781C284.346,1132.819,434.302,1200,600,1200c291.26,0,533.991-207.555,588.501-482.812h-166.553C970.631,902.243,801.396,1038.281,600,1038.281c-121.069,0-230.474-49.195-309.668-128.613l192.48-192.48H0z" fill="currentColor"/></svg>
        </button>
      </div>
      <div id="fileList" class="file-list"></div>
      <div id="fileSpace" class="file-space">free: --</div>
      <input type="file" id="fileInput" accept=".lua" hidden>
    </div>

    <div id="replPane" class="pane">
      <div class="output-container">
        <div id="output" class="output"></div>
        <button id="midiPanicBtn" class="output-float-btn" title="midi panic — all notes off" style="right: 80px;">panic</button>
        <button id="clearBtn" class="output-float-btn" title="clear output">clear</button>
        <a href="https://codeberg.org/tehn/iii-scripts" target="_blank" rel="noopener" class="output-float-link">iii-scripts</a>
      </div>
      <div class="repl-toolbar">
        <button id="gridBtn" class="toolbar-btn">connect</button>
        <button id="uploadBtn" class="toolbar-btn">upload</button>
        <button id="restartBtn" class="toolbar-btn" title="restart (^^i)">reboot</button>
        <button id="reformatBtn" class="toolbar-btn" title="reformat filesystem">reformat</button>
        <span class="toolbar-spacer"></span>
        <span class="arc-key-label">arc key</span>
        <button type="button" id="arcKeyBtn" class="arc-key-btn" title="arc key"></button>
      </div>
      <div class="repl-input-container">
        <div class="repl-input-row">
          <span class="repl-input-prompt">&gt;&gt;</span>
          <textarea id="replInput" class="repl-input"
                    placeholder="send iii commands live here" rows="2"></textarea>
        </div>
      </div>
    </div>
  </main>

  <div role="alertdialog" aria-modal="true" id="browserWarning" class="modal" style="display: none;">
    <div class="modal-content">
      <h2>browser not supported</h2>
      <p>viii requires the Web Serial API, which is only available in Chromium-based browsers.</p>
      <p>please use Chrome, Edge, or Opera.</p>
      <button type="button" id="closeWarning" class="modal-btn">close</button>
    </div>
  </div>

  <script src="viii.js"></script>
  <script src="bridge.js"></script>
</body>
</html>
